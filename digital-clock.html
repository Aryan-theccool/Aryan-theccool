<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 50px;
        }
        .clock {
            font-size: 48px;
            margin: 20px;
        }
        .time-zone {
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div id="clocks"></div>
    <script>
        function updateClocks() {
            const timeZones = [
                { name: 'UTC', offset: 0 },
                { name: 'EST', offset: -5 },
                { name: 'CST', offset: -6 },
                { name: 'MST', offset: -7 },
                { name: 'PST', offset: -8 },
                { name: 'GMT', offset: 0 },
                { name: 'CET', offset: 1 },
                { name: 'IST', offset: 5.5 }
            ];

            let clocksHtml = '';

            timeZones.forEach(tz => {
                const date = new Date();
                const utc = date.getTime() + (date.getTimezoneOffset() * 60000);
                const timeZoneTime = new Date(utc + (3600000 * tz.offset));
                const timeString = timeZoneTime.toISOString().slice(11, 19);
                clocksHtml += `<div class='time-zone'>${tz.name}: <span class='clock'>${timeString}</span></div>`;
            });

            document.getElementById('clocks').innerHTML = clocksHtml;
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
